apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: v6-dell-xr11-cluster
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - fd00:bad:face::/48
    services:
      cidrBlocks:
        - fd00:bad:deaf:beef::/112
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
    kind: RKE2ControlPlane
    name: v6-dell-xr11-cluster
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: Metal3Cluster
    name: v6-dell-xr11-cluster
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3Cluster
metadata:
  name: v6-dell-xr11-cluster
  namespace: default
spec:
  controlPlaneEndpoint:
    host: "2a07:de40:a102:7:b645:6ff:feed:11e2"
    port: 6443
  noCloudProvider: true
---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
kind: RKE2ControlPlane
metadata:
  name: v6-dell-xr11-cluster
  namespace: default
spec:
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: Metal3MachineTemplate
    name: v6-dell-xr11-cluster-controlplane
  replicas: 1
  serverConfig:
    cni: calico
    cniMultusEnable: true
    tlsSan:
      - "2a07:de40:a102:7:b645:6ff:feed:11e2"
  agentConfig:
    format: ignition
    cisProfile: cis
    additionalUserData:
      config: |
        variant: fcos
        version: 1.4.0
        passwd:
          users:
           - name: root
             password_hash: "$6$p8NQ4Cc8jcVbM4EA$Y8UPX4.MH4XBt2XZ5Z/F/AULXKqyHXYduPBujSkMHrOk60BdDtH4j2kTlGAmWRxaz/HnifmiPkgrtLPP2wF46."
        systemd:
          units:
            - name: rke2-preinstall.service
              enabled: true
              contents: |
                [Unit]
                Description=rke2-preinstall
                Wants=network-online.target
                Before=rke2-install.service
                ConditionPathExists=!/run/cluster-api/bootstrap-success.complete
                [Service]
                Type=oneshot
                User=root
                ExecStartPre=/bin/sh -c "mount -L config-2 /mnt"
                ExecStart=/bin/sh -c "sed -i \"s/BAREMETALHOST_UUID/$(jq -r .uuid /mnt/openstack/latest/meta_data.json)/\" /etc/rancher/rke2/config.yaml"
                ExecStart=/bin/sh -c "echo \"node-name: $(jq -r .name /mnt/openstack/latest/meta_data.json)\" >> /etc/rancher/rke2/config.yaml"
                ExecStartPost=/bin/sh -c "umount /mnt"
                [Install]
                WantedBy=multi-user.target
        storage:
          files:
            - path: /var/lib/rancher/rke2/agent/etc/resolv.conf
              overwrite: true
              contents:
                inline: |
                  nameserver 2001:4860:4860::8844
              mode: 0644
              user:
                name: root
              group:
                name: root
            - path: /var/lib/rancher/rke2/server/manifests/rke2-canal-config.yaml
              overwrite: true
              contents:
                inline: |
                  ---
                  apiVersion: helm.cattle.io/v1
                  kind: HelmChartConfig
                  metadata:
                    name: rke2-calico
                    namespace: kube-system
                  spec:
                    valuesContent: |-
                      calico:
                        ipAutoDetectionMethod: "none"
            - path: /var/lib/rancher/rke2/server/manifests/rke2-multus-config.yaml
              overwrite: true
              contents:
                inline: |
                  ---
                  apiVersion: helm.cattle.io/v1
                  kind: HelmChartConfig
                  metadata:
                    name: rke2-multus
                    namespace: kube-system
                  spec:
                    valuesContent: |-
                      rke2-whereabouts:
                        enabled: true
              mode: 0644
              user:
                name: root
              group:
                name: root
            - path: /var/lib/rancher/rke2/server/manifests/v6-nad-whereabouts.yaml
              overwrite: true
              contents:
                inline: |
                  ---
                  apiVersion: k8s.cni.cncf.io/v1
                  kind: NetworkAttachmentDefinition
                  metadata:
                    name: nad-test-conf
                    namespace: kube-system
                  spec:
                    config: |-
                      {
                          "cniVersion": "0.3.0",
                          "name": "ptp-whereabouts-conf",
                          "type": "ptp",
                          "ipam": {
                              "type": "whereabouts",
                              "range":   "fd:1234:4321::/64",
                              "gateway": "fd:1234:4321:ffff::1"
                          }
                      }
              mode: 0644
              user:
                name: root
              group:
                name: root
    kubelet:
      extraArgs:
        - provider-id=metal3://BAREMETALHOST_UUID
    version: v1.31.2+rke2r1
    nodeName: "lab-xr11.demo"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: v6-dell-xr11-cluster-controlplane
  namespace: default
spec: 
  template:
    spec:
      automatedCleaningMode: metadata
      dataTemplate:
        name: v6-dell-xr11-cluster-controlplane-template
      hostSelector:
        matchLabels:
          cluster-role: control-plane
          node: lab-dell-xr11-2 
      image:
        checksum: http://[2a07:de40:a102:7:21e:67ff:fe49:6a17]:8080/eibimage-slmicro60rt-marco.raw.sha256
        checksumType: sha256
        format: raw
        url: http://[2a07:de40:a102:7:21e:67ff:fe49:6a17]:8080/eibimage-slmicro60rt-marco.raw
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3DataTemplate
metadata:
  name: v6-dell-xr11-cluster-controlplane-template
  namespace: default
spec:
  clusterName: v6-dell-xr11-cluster
  metaData:
    objectNames:
      - key: name
        object: machine
      - key: local-hostname
        object: machine
      - key: local_hostname
        object: machine
