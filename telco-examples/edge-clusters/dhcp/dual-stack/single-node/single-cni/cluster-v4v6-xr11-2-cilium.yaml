apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: v4v6-dell-xr11-cluster
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 192.168.0.0/18
        - fd00:bad:face::/48
    services:
      cidrBlocks:
        - 10.96.0.0/12
        - fd00:bad:deaf:beef::/112
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
    kind: RKE2ControlPlane
    name: v4v6-dell-xr11-cluster
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: Metal3Cluster
    name: v4v6-dell-xr11-cluster
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3Cluster
metadata:
  name: v4v6-dell-xr11-cluster
  namespace: default
spec:
  controlPlaneEndpoint:
    host: 10.168.200.52
    port: 6443
  noCloudProvider: true
---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
kind: RKE2ControlPlane
metadata:
  name: v4v6-dell-xr11-cluster
  namespace: default
spec:
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: Metal3MachineTemplate
    name: v4v6-dell-xr11-cluster-controlplane
  replicas: 1
  serverConfig:
    cni: cilium
    tlsSan:
      - "2a07:de40:a102:7:b645:6ff:feed:11e2"
      - 10.168.200.52
  agentConfig:
    format: ignition
    cisProfile: cis
    additionalUserData:
      config: |
        variant: fcos
        version: 1.4.0
        passwd:
          users:
           - name: root
             password_hash: "$6$p8NQ4Cc8jcVbM4EA$Y8UPX4.MH4XBt2XZ5Z/F/AULXKqyHXYduPBujSkMHrOk60BdDtH4j2kTlGAmWRxaz/HnifmiPkgrtLPP2wF46."
        systemd:
          units:
            - name: rke2-preinstall.service
              enabled: true
              contents: |
                [Unit]
                Description=rke2-preinstall
                Wants=network-online.target
                Before=rke2-install.service
                ConditionPathExists=!/run/cluster-api/bootstrap-success.complete
                [Service]
                Type=oneshot
                User=root
                ExecStartPre=/bin/sh -c "mount -L config-2 /mnt"
                ExecStart=/bin/sh -c "sed -i \"s/BAREMETALHOST_UUID/$(jq -r .uuid /mnt/openstack/latest/meta_data.json)/\" /etc/rancher/rke2/config.yaml"
                ExecStart=/bin/sh -c "echo \"node-name: $(jq -r .name /mnt/openstack/latest/meta_data.json)\" >> /etc/rancher/rke2/config.yaml"
                ExecStartPost=/bin/sh -c "umount /mnt"
                [Install]
                WantedBy=multi-user.target
        storage:
          files:
            - path: /var/lib/rancher/rke2/agent/etc/resolv.conf
              overwrite: true
              contents:
                inline: |
                  nameserver 8.8.4.4
                  nameserver 2001:4860:4860::8844
              mode: 0644
              user:
                name: root
              group:
                name: root
    kubelet:
      extraArgs:
        - provider-id=metal3://BAREMETALHOST_UUID
    version: v1.31.2+rke2r1
    nodeName: "lab-xr11.demo"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: v4v6-dell-xr11-cluster-controlplane
  namespace: default
spec: 
  template:
    spec:
      automatedCleaningMode: metadata
      dataTemplate:
        name: v4v6-dell-xr11-cluster-controlplane-template
      hostSelector:
        matchLabels:
          cluster-role: control-plane
          node: lab-dell-xr11-2 
      image:
        checksum: http://10.168.200.22:8080/eibimage-slmicro60rt-marco.raw.sha256
        checksumType: sha256
        format: raw
        url: http://10.168.200.22:8080/eibimage-slmicro60rt-marco.raw
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3DataTemplate
metadata:
  name: v4v6-dell-xr11-cluster-controlplane-template
  namespace: default
spec:
  clusterName: v4v6-dell-xr11-cluster
  metaData:
    objectNames:
      - key: name
        object: machine
      - key: local-hostname
        object: machine
      - key: local_hostname
        object: machine

